<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Students List</title>
</head>
<body>
    <h1>Students List</h1>
    <ul>
        {% for student in students %}
        <li><a href="{% url 'student_detail' student.id %}">{{ student.first_name }} {{ student.last_name }}</a></li>
        {% endfor %}
    </ul>
    <a href="{% url 'student_create' %}">Create Student</a>
</body>
</html>
